<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tharun's Diary</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:      #0d0d0d;
  --bg2:     #111;
  --bg3:     #161616;
  --bg4:     #1c1c1c;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text-1:  #ebebeb;
  --text-2:  #909090;
  --text-3:  #505050;
  --accent:  #c8a96e;
  --star:    #f5c518;
  --green:   #4ade80;
  --blue:    #60a5fa;
  --red:     #f87171;
  
  /* Pill Colors */
  --pill-bg:     rgba(255,255,255,0.06);
  --pill-bd:     rgba(255,255,255,0.10);
  --pill-rew-bg: rgba(167,139,250,0.12);
  --pill-rew-bd: rgba(167,139,250,0.25);
  --pill-rew-tx: #c4b5fd;
  
  --hover:   rgba(255,255,255,0.03);
  --hdr:     62px;
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text-1);
  font-family:'Inter',system-ui,sans-serif;
  font-size:16px;
  line-height:1.6;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ═══════════════════════════════════
   INTRO
═══════════════════════════════════ */
#intro{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.intro-text{
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;font-weight:700;
  font-size:clamp(52px,10vw,96px);
  color:var(--text-1);
  letter-spacing:-2px;line-height:1;
  opacity:0;transform:scale(0.92) translateY(14px);
  animation:iShow 0.8s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
  white-space:nowrap;
}
.intro-text em{color:var(--accent);font-style:italic}
@keyframes iShow{to{opacity:1;transform:scale(1) translateY(0)}}
#intro.fade-out{animation:iFade 0.55s ease forwards}
@keyframes iFade{to{opacity:0}}

/* ═══════════════════════════════════
   HEADER
═══════════════════════════════════ */
header{
  position:sticky;top:0;z-index:100;
  height:var(--hdr);
  background:rgba(13,13,13,0.96);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 clamp(12px,4vw,48px);
  gap:12px;
  opacity:0;transition:opacity 0.5s ease;
}
header.vis{opacity:1}

.logo{
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;font-weight:700;
  font-size:clamp(18px,2.6vw,28px);
  color:var(--text-1);letter-spacing:-0.5px;
  user-select:none;line-height:1;white-space:nowrap;
  flex-shrink:0;
}
.logo em{color:var(--accent)}

.hdr-right{
  display:flex;align-items:center;
  gap:8px;flex-shrink:0;
}

.entry-count{
  font-size:12px;font-weight:500;
  color:var(--text-2);white-space:nowrap;
  margin-right:4px;
}

.badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:600;
  padding:5px 12px 5px 9px;
  border-radius:24px;border:1px solid;
  text-decoration:none;white-space:nowrap;
  transition:filter 0.2s,transform 0.18s;line-height:1;
}
.badge:hover{filter:brightness(1.3);transform:translateY(-1px)}
.badge-lb{color:var(--green);border-color:rgba(74,222,128,0.28);background:rgba(74,222,128,0.07)}
.badge-sz{color:var(--blue);border-color:rgba(96,165,250,0.28);background:rgba(96,165,250,0.07)}
.badge-err{color:var(--red);border-color:rgba(248,113,113,0.28);background:rgba(248,113,113,0.07)}

.bdot{
  width:7px;height:7px;border-radius:50%;
  background:currentColor;flex-shrink:0;
  animation:pulse 2.2s ease infinite;
}
.bdot.dead{animation:none;opacity:0.3}
.badge-label{font-size:12px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}

/* ═══════════════════════════════════
   MAIN & TABLE WRAPPER
═══════════════════════════════════ */
main{
  max-width:1100px;margin:0 auto;
  padding:0 clamp(12px,4vw,48px) 80px;
  opacity:0;transition:opacity 0.5s ease 0.1s;
}
main.vis{opacity:1}

.table-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}
.table-wrap::-webkit-scrollbar{height:4px}
.table-wrap::-webkit-scrollbar-track{background:transparent}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── Grid setup for columns ── */
.col-head, .row {
  display:grid;
  grid-template-columns: 100px 56px 1fr 90px 110px;
  align-items:center;
  gap:12px;
}

/* ── column header ── */
.col-head{
  padding:22px 16px 10px;
  border-bottom:1px solid var(--border2);
  margin-top:26px;
}
.ch{
  font-size:10px;font-weight:700;
  letter-spacing:1.6px;text-transform:uppercase;color:var(--text-3);
}
.ch.r{text-align:right}

/* ── month separator ── */
.month-sep{
  display:flex;align-items:center;gap:12px;
  padding:24px 16px 8px;
}
.ms-label{
  font-size:20px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--accent);white-space:nowrap;
}
.ms-line{flex:1;height:1px;background:var(--border)}
.ms-count{font-size:15px;color:var(--text-3);white-space:nowrap}

/* ── diary row ── */
.row{
  min-height:56px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  transition:background 0.14s;
  animation:rowIn 0.32s ease both;
}
.row:hover{background:var(--hover)}
@keyframes rowIn{
  from{opacity:0;transform:translateY(5px)}
  to  {opacity:1;transform:translateY(0)}
}

/* ── Date ── */
.r-date{
  font-size:13px;color:var(--text-2);
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}

/* ── Type Pill ── */
.r-type-cell{display:flex;align-items:center}
.type-pill{
  display:inline-flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;letter-spacing:0.8px;
  text-transform:uppercase;padding:3px 7px;border-radius:4px;
  border:1px solid var(--pill-bd);
  background:var(--pill-bg);
  white-space:nowrap;
}
.type-film{color:var(--green);border-color:rgba(74,222,128,0.20);background:rgba(74,222,128,0.08)}
.type-tv  {color:var(--blue); border-color:rgba(96,165,250,0.20);background:rgba(96,165,250,0.08)}

/* ── Title Cell & Rewatch Pill ── */
.r-title-wrap{
  display:flex;
  align-items:center; /* Centers title and pill vertically */
  gap:10px;           /* EXACT 10px GAP */
  min-width:0;
}

.r-title{
  font-size:14.5px;
  font-weight:500;
  color:var(--text-1);
  line-height:1.4;
  /* Allow the title to fully wrap so it's entirely visible */
  white-space:normal; 
  word-break:break-word;
}

.rewatch-pill{
  flex:0 0 auto; /* Ensures the pill NEVER shrinks */
  font-size:9px;
  font-weight:800;
  letter-spacing:0.8px;
  text-transform:uppercase;
  padding:3px 7px;
  border-radius:4px;
  white-space:nowrap;
  color:var(--pill-rew-tx);
  background:var(--pill-rew-bg);
  border:1px solid var(--pill-rew-bd);
}

/* ── Released ── */
.r-year{
  font-size:13px;color:var(--text-3);
  font-variant-numeric:tabular-nums;white-space:nowrap;
}

/* ── Rating ── */
.r-rating{text-align:right;white-space:nowrap}
.stars{font-size:14px;color:var(--star);letter-spacing:1.4px}
.no-rating{font-size:12px;color:var(--text-3)}

/* ═══════════════════════════════════
   STATES & TOAST
═══════════════════════════════════ */
.loading{padding:110px 0;text-align:center}
.spin-lg{
  width:28px;height:28px;
  border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.75s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:15px;color:var(--text-2)}
.load-sub{font-size:12px;color:var(--text-3);margin-top:5px}

.msg-box{
  margin:90px auto;max-width:380px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;padding:48px 32px;text-align:center;
}
.msg-ico{font-size:28px;margin-bottom:14px}
.msg-title{font-size:17px;font-weight:600;margin-bottom:8px}
.msg-body{font-size:13px;color:var(--text-2);line-height:1.9}
.msg-body code{background:var(--bg4);padding:2px 6px;border-radius:3px;font-size:12px}

.toast{
  position:fixed;bottom:22px;right:22px;
  background:#1a1a1a;border:1px solid var(--border2);
  border-radius:8px;padding:10px 16px;
  font-size:13px;color:var(--text-2);
  display:flex;align-items:center;gap:9px;
  opacity:0;transform:translateY(6px);
  transition:opacity 0.3s,transform 0.3s;
  pointer-events:none;z-index:500;max-width:260px;
}
.toast.show{opacity:1;transform:translateY(0)}
.t-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  animation:pulse 1.5s ease infinite;
}

/* ═══════════════════════════════════
   RESPONSIVE (MOBILE)
═══════════════════════════════════ */
@media(max-width:640px){
  header{height:54px;padding:0 12px}
  .logo{font-size:17px}
  .entry-count{display:none}
  .badge{font-size:11px;padding:5px 10px 5px 8px}
  .bdot{width:6px;height:6px}

  main{padding:0 0 60px}

  /* Force min-width to enable horizontal scrolling & give titles room */
  .col-head, .row {
    min-width: 650px !important; 
    grid-template-columns: 85px 50px 1fr 70px 85px; 
    gap: 12px;
  }
  
  .col-head{padding:18px 12px 8px; margin-top:16px;}
  .month-sep{min-width: 650px; padding-left:12px; padding-right:12px;}
  .row{min-height:50px; padding:10px 12px;}

  /* Font tweaks for mobile */
  .r-date {font-size:12px}
  .r-title{font-size:14px} /* Title will wrap naturally, no dots! */
  .r-year {font-size:12px}
  .stars  {font-size:13px}

  .toast{bottom:12px;right:12px;left:12px;max-width:none}
}

/* Tablet / Desktop Grid tweaks */
@media(min-width:900px){
  .col-head, .row { grid-template-columns:110px 60px 1fr 110px 120px; }
}
@media(min-width:1200px){
  .col-head, .row { grid-template-columns:130px 60px 1fr 130px 140px; }
  .r-title{font-size:15.5px}
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-text">Tharun's&nbsp;<em>Diary</em></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="t-dot"></span>
  <span id="toastMsg">Refreshing…</span>
</div>

<!-- HEADER -->
<header id="hdr">
  <div class="logo">Tharun's&nbsp;<em>Diary</em></div>
  <div class="hdr-right">
    <span class="entry-count" id="countEl">—</span>
    <a class="badge badge-lb" id="badgeLB"
       href="https://letterboxd.com/a__tharun/diary/"
       target="_blank" rel="noopener">
      <span class="bdot" id="dotLB"></span>
      <span class="badge-label">Letterboxd</span>
    </a>
    <a class="badge badge-sz" id="badgeSZ"
       href="https://www.serializd.com/user/tharun123/diary"
       target="_blank" rel="noopener">
      <span class="bdot" id="dotSZ"></span>
      <span class="badge-label">Serializd</span>
    </a>
  </div>
</header>

<!-- MAIN -->
<main id="main">
  <div class="table-wrap">
    <div class="col-head" id="colHead">
      <span class="ch ch-date">Date</span>
      <span class="ch">Type</span>
      <span class="ch">Title</span>
      <span class="ch">Released</span>
      <span class="ch r">Rating</span>
    </div>

    <div id="diary">
      <div class="loading">
        <div class="spin-lg"></div>
        <div class="load-txt">Loading diary…</div>
        <div class="load-sub">Fetching entries</div>
      </div>
    </div>
  </div>
</main>

<script>
'use strict';

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');

function fmtDate(s){
  if(!s) return '—';
  const parts = s.split('-').map(Number);
  if(parts.length < 3 || parts.some(isNaN)) return s;
  const [y,m,d] = parts;
  return `${pad(d)}/${pad(m)}/${y}`;
}

function monthKey(s){
  if(!s) return 'Undated';
  const [y,m] = s.split('-').map(Number);
  if(!y||!m) return 'Undated';
  const names = ['January','February','March','April','May','June',
                 'July','August','September','October','November','December'];
  return `${names[m-1]} ${y}`;
}

function toStars(r){
  if(r==null||r==='') return '';
  const v = parseFloat(r);
  if(isNaN(v)||v<=0) return '';
  return '★'.repeat(Math.floor(v)) + ((v%1)>=0.4?'½':'');
}

function esc(s){
  return String(s??'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _tt=null;
function showToast(msg,ms=0){
  $('toastMsg').textContent = msg;
  $('toast').classList.add('show');
  if(_tt){clearTimeout(_tt);_tt=null;}
  if(ms>0) _tt=setTimeout(()=>$('toast').classList.remove('show'),ms);
}

function runIntro(){
  return new Promise(resolve=>{
    const el=$('intro');
    setTimeout(()=>{
      el.classList.add('fade-out');
      setTimeout(()=>{
        el.style.display='none';
        $('hdr').classList.add('vis');
        $('main').classList.add('vis');
        resolve();
      },560);
    },1750);
  });
}

function badgeOK(id){
  const b=$('badge'+id); if(!b) return;
  b.classList.remove('badge-err');
  b.classList.add(id==='LB' ? 'badge-lb' : 'badge-sz');
  $('dot'+id)?.classList.remove('dead');
}
function badgeErr(id){
  const b=$('badge'+id); if(!b) return;
  b.classList.remove('badge-lb','badge-sz');
  b.classList.add('badge-err');
  $('dot'+id)?.classList.add('dead');
}

function renderEntries(entries){
  const container = $('diary');

  if(!entries.length){
    container.innerHTML = `
      <div class="msg-box">
        <div class="msg-ico">📭</div>
        <div class="msg-title">No entries found</div>
        <div class="msg-body">Check your Letterboxd &amp; Serializd profiles.</div>
      </div>`;
    return;
  }

  const groups = new Map();
  const order  = [];

  for(const e of entries){
    const mk = monthKey(e.watched_date);
    if(!groups.has(mk)){ groups.set(mk, []); order.push(mk); }
    groups.get(mk).push(e);
  }

  let html = '';
  for(const mk of order){
    const grp = groups.get(mk);
    html += `
      <div class="month-sep">
        <span class="ms-label">${mk}</span>
        <span class="ms-line"></span>
        <span class="ms-count">${grp.length}</span>
      </div>
    `;

    for(const e of grp){
      const stars = toStars(e.rating);
      const isTV  = e.type === 'tv';
      const isRew = !!e.rewatch;

      html += `
        <div class="row">
          <div class="r-date">${fmtDate(e.watched_date)}</div>

          <div class="r-type-cell">
            <span class="type-pill ${isTV ? 'type-tv' : 'type-film'}">
              ${isTV ? 'TV' : 'Film'}
            </span>
          </div>

          <div class="r-title-wrap">
            <div class="r-title" title="${esc(e.title)}">${esc(e.title)}</div>
            ${isRew ? `<span class="rewatch-pill">REWATCH</span>` : ``}
          </div>

          <div class="r-year">${esc(e.year || '—')}</div>

          <div class="r-rating">
            ${stars
              ? `<span class="stars" title="${e.rating}/5">${stars}</span>`
              : `<span class="no-rating">—</span>`}
          </div>
        </div>
      `;
    }
  }

  container.innerHTML = html;
}

let _poll=null, _lastCount=0;

function startPoll(){
  if(_poll) return;
  _poll = setInterval(async()=>{
    try{
      const r  = await fetch('/api/status');
      const sd = await r.json();
      if(!sd.refreshing){
        clearInterval(_poll); _poll=null;
        const newTotal = (sd.lb_count||0) + (sd.sz_count||0);
        if(newTotal !== _lastCount){
          showToast('New entries — reloading…');
          setTimeout(()=>location.reload(),1000);
        } else {
          showToast('Up to date ✓',2500);
        }
      }
    }catch{
      clearInterval(_poll); _poll=null;
    }
  }, 3000);
}

async function init(){
  const [, apiRes] = await Promise.allSettled([
    runIntro(),
    fetch('/api/diary').then(r => r.json()),
  ]);

  if(apiRes.status === 'rejected'){
    badgeErr('LB'); badgeErr('SZ');
    $('diary').innerHTML = `
      <div class="msg-box">
        <div class="msg-ico">⚠️</div>
        <div class="msg-title">Server not running</div>
        <div class="msg-body">
          Run: <code>python server.py</code><br><br>
          Then open <strong>http://localhost:3000</strong>
        </div>
      </div>`;
    return;
  }

  const data    = apiRes.value;
  const entries = data.entries || [];
  _lastCount    = data.count || 0;

  (data.lb_count > 0) ? badgeOK('LB') : badgeErr('LB');
  (data.sz_count > 0) ? badgeOK('SZ') : badgeErr('SZ');

  $('countEl').textContent = `${(data.lb_count||0)+(data.sz_count||0)} entries`;

  renderEntries(entries);

  if(data.refreshing){
    showToast('Updating in background…');
    startPoll();
  }
}

init();
</script>
</body>
</html>
